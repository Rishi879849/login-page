<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Digital Twin Verse — Premium login portal for DTV platform." />
  <title>Digital Twin Verse — Sign In</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>" />
</head>
<body>

  <!-- ===== BACKGROUND LAYERS ===== -->
  <div class="bg-nebula" aria-hidden="true"></div>
  <div class="bg-overlay" aria-hidden="true"></div>
  <canvas id="starfield" aria-hidden="true"></canvas>

  <!-- Floating Particles -->
  <div class="particles" aria-hidden="true" id="particles"></div>

  <!-- ===== LOGIN CARD ===== -->
  <main class="login-card" role="main">

    <!-- Logo -->
    <div class="logo-wrap">
      <div class="logo">
        <img src="assets/dtv-logo.png" alt="Digital Twin Verse" />
      </div>
    </div>

    <!-- Heading -->
    <div class="card-heading">
      <h1>Welcome Back</h1>
    </div>
    <p class="card-subtitle">Sign in to your Digital Twin Verse account</p>

    <!-- Form -->
    <form class="login-form" id="loginForm" novalidate>

      <!-- Email -->
      <div class="input-group">
        <label for="email">Email</label>
        <div class="input-wrapper">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="3"/>
            <polyline points="22,5 12,13 2,5"/>
          </svg>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          />
        </div>
      </div>

      <!-- Password -->
      <div class="input-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="3"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            <circle cx="12" cy="16.5" r="1.5"/>
          </svg>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
          <button type="button" class="password-toggle" id="togglePassword" aria-label="Toggle password visibility">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" id="eyeIcon">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Options -->
      <div class="options-row">
        <label class="remember-me">
          <input type="checkbox" id="remember" />
          <span class="checkmark">
            <svg viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3"/></svg>
          </span>
          Remember me
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <!-- CTA — Liquid Glow Button -->
      <button type="submit" class="btn-signin" id="signinBtn">
        <span class="btn-text">Sign In</span>
        <span class="btn-liquid-wrap">
          <span class="btn-liquid-fill"></span>
          <span class="btn-liquid-ball-l"></span>
          <span class="btn-liquid-ball-r"></span>
          <span class="btn-liquid-pulse"></span>
        </span>
      </button>
    </form>

    <!-- Divider -->
    <div class="divider"><span>or continue with</span></div>

    <!-- Social Login -->
    <div class="social-row">
      <!-- Google -->
      <button type="button" class="social-btn social-google" aria-label="Sign in with Google" id="socialGoogle">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path class="g-blue"   d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
          <path class="g-green"  d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path class="g-yellow" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path class="g-red"    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
      </button>
      <!-- Apple -->
      <button type="button" class="social-btn social-apple" aria-label="Sign in with Apple" id="socialApple">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C3.79 16.17 4.36 9.02 8.79 8.76c1.26.06 2.14.72 2.88.76.99-.2 1.95-.78 3.02-.7 1.28.1 2.25.62 2.88 1.56-2.64 1.58-2.01 5.06.36 6.03-.47 1.24-.72 1.79-1.38 2.87h-.5zM12.05 8.68c-.15-2.23 1.66-4.15 3.74-4.34.3 2.45-2.17 4.52-3.74 4.34z"/>
        </svg>
      </button>
      <!-- GitHub -->
      <button type="button" class="social-btn social-github" aria-label="Sign in with GitHub" id="socialGithub">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.02 10.02 0 0 0 22 12.017C22 6.484 17.522 2 12 2z"/>
        </svg>
      </button>
      <!-- Microsoft -->
      <button type="button" class="social-btn social-microsoft" aria-label="Sign in with Microsoft" id="socialMicrosoft">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <rect class="ms-red"    x="2"    y="2"    width="9.5" height="9.5"/>
          <rect class="ms-green"  x="12.5" y="2"    width="9.5" height="9.5"/>
          <rect class="ms-blue"   x="2"    y="12.5" width="9.5" height="9.5"/>
          <rect class="ms-yellow" x="12.5" y="12.5" width="9.5" height="9.5"/>
        </svg>
      </button>
    </div>

    <!-- Footer -->
    <div class="card-footer">
      Don't have an account? <a href="register.html">Create one</a>
    </div>

  </main>

  <script src="app.js"></script>
</body>
</html>
