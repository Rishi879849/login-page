<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Digital Twin Verse — Premium registration portal for DTV platform." />
  <title>Digital Twin Verse — Register</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>" />
</head>
<body>

  <!-- ===== BACKGROUND LAYERS ===== -->
  <div class="bg-nebula" aria-hidden="true"></div>
  <div class="bg-overlay" aria-hidden="true"></div>
  <canvas id="starfield" aria-hidden="true"></canvas>

  <!-- Floating Particles -->
  <div class="particles" aria-hidden="true" id="particles"></div>

  <!-- ===== REGISTRATION CARD ===== -->
  <main class="login-card registration-card" role="main">

    <!-- Logo -->
    <div class="logo-wrap">
      <div class="logo">
        <img src="assets/dtv-logo.png" alt="Digital Twin Verse" />
      </div>
    </div>

    <!-- Heading -->
    <div class="card-heading">
      <h1>Create Account</h1>
    </div>
    <p class="card-subtitle">Join the Digital Twin Verse platform</p>

    <!-- Form -->
    <form class="login-form" id="registerForm" novalidate>
      
      <!-- Full Name -->
      <div class="input-group">
        <label for="fullName">Full Name</label>
        <div class="input-wrapper">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <input
            type="text"
            id="fullName"
            name="fullName"
            placeholder="John Doe"
            autocomplete="name"
            required
          />
        </div>
      </div>

      <!-- Email -->
      <div class="input-group">
        <label for="email">Email</label>
        <div class="input-wrapper">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="3"/>
            <polyline points="22,5 12,13 2,5"/>
          </svg>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          />
        </div>
      </div>

      <!-- Mobile Number -->
      <div class="input-group">
        <label for="mobile">Mobile Number</label>
        <div class="input-wrapper">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
          <input
            type="tel"
            id="mobile"
            name="mobile"
            placeholder="+1 (123) 456-7890"
            autocomplete="tel"
            required
          />
        </div>
      </div>

      <!-- Custom Role Selector ("I AM ROLE") -->
      <div class="input-group">
        <label id="roleLabel">I Am</label>
        <div class="custom-select-wrapper">
          <!-- Accessible trigger button -->
          <button 
            type="button" 
            class="custom-select-trigger" 
            id="roleTrigger"
            aria-haspopup="listbox" 
            aria-expanded="false" 
            aria-labelledby="roleLabel roleTrigger"
          >
            <span class="trigger-icon-wrap">
              <!-- Inline SVG Spark/Magic-wand icon -->
              <svg class="select-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 4V2"/>
                <path d="M15 16v-2"/>
                <path d="M8 9h2"/>
                <path d="M20 9h2"/>
                <path d="M17.8 5.8l-1.4 1.4"/>
                <path d="M12.2 11.4l-1.4 1.4"/>
                <path d="M12.2 6.6l-1.4-1.4"/>
                <path d="M17.8 12.2l-1.4-1.4"/>
                <path d="M3 13a4 4 0 0 0 4 4h4a4 4 0 0 0 4-4V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v8z"/>
              </svg>
            </span>
            <span class="trigger-text" id="roleTriggerText">Select your role</span>
            <!-- Arrow icon -->
            <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </button>

          <!-- Dropdown Options List -->
          <ul 
            class="custom-options-list" 
            id="roleOptions" 
            role="listbox" 
            aria-labelledby="roleLabel"
            tabindex="-1"
          >
            <li class="custom-option" role="option" data-value="School Student" id="opt-school">School Student</li>
            <li class="custom-option" role="option" data-value="Undergraduate" id="opt-undergrad">Undergraduate</li>
            <li class="custom-option" role="option" data-value="Postgraduate" id="opt-postgrad">Postgraduate</li>
            <li class="custom-option" role="option" data-value="Parent" id="opt-parent">Parent</li>
            <li class="custom-option" role="option" data-value="Career Counsellor" id="opt-counsellor">Career Counsellor</li>
            <li class="custom-option" role="option" data-value="Other" id="opt-other">Other</li>
          </ul>

          <!-- Native select hidden for form binding/accessibility fallback -->
          <select id="roleSelect" name="role" required class="sr-only" tabindex="-1">
            <option value="" disabled selected>Select your role</option>
            <option value="School Student">School Student</option>
            <option value="Undergraduate">Undergraduate</option>
            <option value="Postgraduate">Postgraduate</option>
            <option value="Parent">Parent</option>
            <option value="Career Counsellor">Career Counsellor</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>

      <!-- Dynamic Role Fields (Beneficial Feature #1) -->
      <!-- School/University Name (for Student roles) -->
      <div class="input-group dynamic-field" id="schoolFieldGroup">
        <label for="schoolName">School/University Name</label>
        <div class="input-wrapper">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
            <path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5"/>
          </svg>
          <input
            type="text"
            id="schoolName"
            name="schoolName"
            placeholder="Harvard University"
          />
        </div>
      </div>

      <!-- Organization/Company Name (for Counsellor role) -->
      <div class="input-group dynamic-field" id="companyFieldGroup">
        <label for="companyName">Organization/Company Name</label>
        <div class="input-wrapper">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
          </svg>
          <input
            type="text"
            id="companyName"
            name="companyName"
            placeholder="Future Ready Corp"
          />
        </div>
      </div>

      <!-- Password (with strength bar and toggle) -->
      <div class="input-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="3"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            <circle cx="12" cy="16.5" r="1.5"/>
          </svg>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="new-password"
            required
          />
          <button type="button" class="password-toggle" id="togglePassword" aria-label="Toggle password visibility">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="eyeIcon">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        
        <!-- Real-Time Password Strength (Beneficial Feature #3) -->
        <div class="password-strength-container">
          <div class="strength-bar-bg">
            <div class="strength-bar-fill" id="strengthFill"></div>
          </div>
          <div class="strength-feedback-row">
            <span class="strength-label" id="strengthLabel">Weak</span>
            <span class="strength-warning" id="strengthWarning">Must be 8+ characters</span>
          </div>
        </div>
      </div>

      <!-- Confirm Password (with toggle) -->
      <div class="input-group">
        <label for="confirmPassword">Confirm Password</label>
        <div class="input-wrapper">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="3"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            <circle cx="12" cy="16.5" r="1.5"/>
          </svg>
          <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            placeholder="••••••••"
            autocomplete="new-password"
            required
          />
          <button type="button" class="password-toggle" id="toggleConfirmPassword" aria-label="Toggle confirm password visibility">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="eyeIcon">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- CTA — Submit Button -->
      <button type="submit" class="btn-signin" id="signupBtn">
        <span class="btn-text">Register</span>
        <span class="btn-liquid-wrap">
          <span class="btn-liquid-fill"></span>
          <span class="btn-liquid-ball-l"></span>
          <span class="btn-liquid-ball-r"></span>
          <span class="btn-liquid-pulse"></span>
        </span>
      </button>
    </form>

    <!-- Footer -->
    <div class="card-footer">
      Already have an account? <a href="index.html">Sign In</a>
    </div>

  </main>

  <script src="app.js"></script>
  <script src="register.js"></script>
</body>
</html>
